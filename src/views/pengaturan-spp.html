<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan SPP - SPP Al-Hikmah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; overflow-x: hidden; }
        .sidebar { background: #40916c; min-height: 100vh; color: #fff; padding-top: 20px; }
        .sidebar h5 { font-weight: 700; letter-spacing: 1px; }
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 12px 25px; display: block; transition: all 0.3s; font-weight: 500; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background: #2d6a4f; border-left: 4px solid #f4a261; }
        .card { border-radius: 12px; }
        .table th { background-color: #f8f9fa; }
    
        /* Override Theme */
        :root {
            --bs-primary: #f4a261;
        }
        .btn-primary { background-color: #f4a261 !important; border-color: #f4a261 !important; color: #fff !important; }
        .btn-primary:hover { background-color: #e76f51 !important; border-color: #e76f51 !important; }
        .btn-outline-primary { color: #f4a261 !important; border-color: #f4a261 !important; }
        .btn-outline-primary:hover { background-color: #f4a261 !important; color: #fff !important; }
        .text-primary { color: #f4a261 !important; }
        .bg-primary { background-color: #f4a261 !important; }
    
        /* Sidebar Enhancements */
        .sidebar a { color: rgba(255,255,255,0.85) !important; font-weight: 500; }
        .sidebar a i { color: rgba(255,255,255,0.85) !important; }
        .sidebar a:hover, .sidebar a.active { color: #fff !important; font-weight: 600; }
        .sidebar a:hover i, .sidebar a.active i { color: #fff !important; }
        .sidebar .border-secondary { border-color: rgba(255,255,255,0.3) !important; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar" style="width: 260px; flex-shrink: 0;">
            <div class="text-center mb-4 pb-2 border-bottom border-secondary mx-3">
                <img src="../assets/images/Logo_Aplikasi.jpeg" alt="Logo" style="width: 50px; height: 50px; background: white; border-radius: 50%; padding: 3px; margin-bottom: 10px;">
                <h5 class="fw-bold m-0">SPP Al-Hikmah</h5>
            </div>
            <a href="dashboard.html"><i class="fas fa-home fa-fw me-2"></i>Dashboard</a>
            <a href="data-siswa.html"><i class="fas fa-users fa-fw me-2"></i>Data Siswa</a>
            <a href="data-kelas.html"><i class="fas fa-chalkboard-teacher fa-fw me-2"></i>Data Kelas</a>
            <a href="tahun-ajaran.html"><i class="fas fa-calendar-alt fa-fw me-2"></i>Tahun Ajaran</a>
            <a href="pengaturan-spp.html" class="active"><i class="fas fa-cog fa-fw me-2"></i>Pengaturan SPP</a>
            <a href="pembayaran.html"><i class="fas fa-money-bill-wave fa-fw me-2"></i>Pembayaran</a>
            <a href="laporan.html"><i class="fas fa-chart-line fa-fw me-2"></i>Laporan</a>
            <div class="mt-5 border-top border-secondary mx-3 pt-3">
                <a href="pengaturan-akun.html"><i class="fas fa-user-cog fa-fw me-2"></i>Pengaturan Akun</a>
                <a href="#" id="btnLogout" class="text-danger"><i class="fas fa-sign-out-alt fa-fw me-2"></i>Logout</a>
            </div>
        </div>
        
        <div class="p-4 flex-grow-1" style="height: 100vh; overflow-y: auto;">
            <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                <h3 class="m-0 font-weight-bold">Pengaturan Nominal SPP</h3>
                <div class="d-flex gap-2">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" class="form-control" id="inputSearch" placeholder="Cari Tahun Ajaran / Kelas...">
                    </div>
                    <button class="btn btn-primary text-nowrap" id="btnTambahPengaturan"><i class="fas fa-plus me-1"></i> Tambah</button>
                </div>
            </div>
            
            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th class="px-4 py-3 border-0">Tahun Ajaran</th>
                                <th class="py-3 border-0">Kelas</th>
                                <th class="py-3 border-0">Nominal SPP (Rp)</th>
                                <th class="py-3 border-0">Jatuh Tempo</th>
                                <th class="px-4 py-3 border-0 text-end">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBodyPengaturan">
                            <tr><td colspan="5" class="text-center py-4">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal fade" id="modalPengaturan" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalPengaturanTitle">Tambah Pengaturan</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formPengaturan">
                        <input type="hidden" id="inputId">
                        <div class="mb-3">
                            <label class="form-label">Tahun Ajaran</label>
                            <select class="form-select" id="inputTA" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Kelas</label>
                            <select class="form-select" id="inputKelas" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nominal SPP (Rp)</label>
                            <input type="number" class="form-control" id="inputNominal" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal Jatuh Tempo (Tanggal)</label>
                            <input type="number" class="form-control" id="inputJatuhTempo" min="1" max="31" placeholder="Contoh: 10" required>
                            <small class="text-muted">Masukkan angka tanggal (1 - 31)</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-primary" id="btnSimpanPengaturan">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../controllers/toast.js"></script>
    <script src="../controllers/pengaturan-spp.js"></script>
</body>
</html>
