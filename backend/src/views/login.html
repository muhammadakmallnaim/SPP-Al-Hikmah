<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - SPP Al-Hikmah</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            background: #ffffff;
        }
        .login-header {
            background: #40916c;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        .login-header h4 {
            margin: 0;
            font-weight: 600;
        }
        .login-body {
            padding: 40px 30px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
        }
        .input-group-text {
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            background: white;
            border-left: none;
        }
        #password {
            border-right: none;
        }
        .btn-login {
            background: #40916c;
            color: #fff;
            border-radius: 8px;
            padding: 12px;
            font-weight: 500;
            width: 100%;
            border: none;
            transition: background 0.3s ease;
        }
        .btn-login:hover {
            background: #2d6a4f;
            color: #fff;
        }
        #loginError {
            display: none;
        }
    
        /* Override Theme */
        :root {
            --bs-primary: #f4a261;
        }
        .btn-primary { background-color: #f4a261 !important; border-color: #f4a261 !important; color: #fff !important; }
        .btn-primary:hover { background-color: #e76f51 !important; border-color: #e76f51 !important; }
        .btn-outline-primary { color: #f4a261 !important; border-color: #f4a261 !important; }
        .btn-outline-primary:hover { background-color: #f4a261 !important; color: #fff !important; }
        .text-primary { color: #f4a261 !important; }
        .bg-primary { background-color: #f4a261 !important; }
    
        /* Sidebar Enhancements */
        .sidebar a { color: rgba(255,255,255,0.85) !important; font-weight: 500; }
        .sidebar a i { color: rgba(255,255,255,0.85) !important; }
        .sidebar a:hover, .sidebar a.active { color: #fff !important; font-weight: 600; }
        .sidebar a:hover i, .sidebar a.active i { color: #fff !important; }
        .sidebar .border-secondary { border-color: rgba(255,255,255,0.3) !important; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <img src="../assets/images/Logo_Aplikasi.jpeg" alt="Logo Yayasan" class="mb-2" style="width: 80px; height: 80px; object-fit: contain; background: white; border-radius: 50%; padding: 5px;">
            <h4>Aplikasi SPP</h4>
            <small>Yayasan Pendidikan Al-Hikmah</small>
        </div>
        <div class="login-body">
            <div class="alert alert-danger text-center" id="loginError" role="alert"></div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted small">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username admin" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Password</label>
                    <div class="input-group">
                        <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
                        <span class="input-group-text" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn btn-login" id="btnLogin">Masuk</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('togglePassword').addEventListener('click', function (e) {
            const password = document.getElementById('password');
            const icon = this.querySelector('i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
    <!-- Script Controller untuk halaman Login -->
    <script src="../controllers/login.js"></script>
    <script src="../controllers/toast.js"></script>
</body>
</html>
